<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Employee Code Entry</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                    screens: {
                        'xs': '480px',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom styles to hide scrollbar but keep functionality if content overflows */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-white min-h-screen w-full flex flex-col items-center justify-center p-4">
<!-- Tablet Container Wrapper -->
<!-- Mimics the 768x1024 portrait ratio or adapts to screen, centered -->
<div class="relative w-full max-w-[768px] h-full min-h-[800px] md:h-auto md:aspect-[3/4] max-h-[1024px] bg-white dark:bg-[#1a202c] shadow-2xl flex flex-col rounded-xl overflow-hidden border border-slate-200 dark:border-slate-800">
<!-- Header Section -->
<header class="flex items-center justify-between p-6 md:p-10 absolute top-0 left-0 w-full z-10">
<button class="group flex items-center justify-center w-14 h-14 rounded-full bg-slate-50 dark:bg-slate-800 hover:bg-primary/10 dark:hover:bg-slate-700 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-background-dark">
<span class="material-symbols-outlined text-3xl text-slate-700 dark:text-slate-200 group-hover:text-primary transition-colors">arrow_back</span>
</button>
<!-- Optional Status Indicator (Battery/Wifi mockup could go here if full OS simulation needed, keeping it clean for now) -->
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-4 w-full h-full pt-12 pb-8">
<!-- Title Section -->
<div class="flex flex-col items-center gap-3 mb-12">
<div class="w-16 h-16 mb-4 rounded-2xl bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-4xl">lock_person</span>
</div>
<h1 class="text-3xl md:text-[32px] font-bold text-slate-900 dark:text-white tracking-tight text-center leading-tight">
                    Enter Your Employee Code
                </h1>
<p class="text-slate-500 dark:text-slate-400 text-lg font-medium text-center max-w-sm">
                    Enter your 6-digit access PIN to clock in
                </p>
</div>
<!-- Input Display (Dots) -->
<!-- Fixed height container for stability -->
<div class="mb-14 flex items-center justify-center">
<div class="flex items-center justify-center gap-4 md:gap-6 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border border-slate-200 dark:border-slate-700 px-8 py-5 h-[80px] w-auto min-w-[320px] md:min-w-[400px] shadow-sm">
<!-- State: 1st digit filled (simulating user just started or focus), rest empty -->
<!-- Active/Filled Dot -->
<div class="w-4 h-4 md:w-5 md:h-5 rounded-full bg-primary shadow-sm shadow-primary/50 transition-all duration-300 scale-110"></div>
<!-- Empty Dots -->
<div class="w-4 h-4 md:w-5 md:h-5 rounded-full bg-slate-300 dark:bg-slate-600"></div>
<div class="w-4 h-4 md:w-5 md:h-5 rounded-full bg-slate-300 dark:bg-slate-600"></div>
<div class="w-4 h-4 md:w-5 md:h-5 rounded-full bg-slate-300 dark:bg-slate-600"></div>
<div class="w-4 h-4 md:w-5 md:h-5 rounded-full bg-slate-300 dark:bg-slate-600"></div>
<div class="w-4 h-4 md:w-5 md:h-5 rounded-full bg-slate-300 dark:bg-slate-600"></div>
</div>
</div>
<!-- Numeric Keypad -->
<div class="w-full max-w-[400px] grid grid-cols-3 gap-4 md:gap-6 mx-auto">
<!-- Row 1 -->
<button class="group relative w-full aspect-square max-w-[100px] max-h-[100px] mx-auto flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-800 border-b-4 border-slate-200 dark:border-slate-900 active:border-b-0 active:translate-y-1 transition-all duration-100 focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="text-3xl md:text-4xl font-semibold text-slate-800 dark:text-white group-hover:scale-110 transition-transform">1</span>
</button>
<button class="group relative w-full aspect-square max-w-[100px] max-h-[100px] mx-auto flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-800 border-b-4 border-slate-200 dark:border-slate-900 active:border-b-0 active:translate-y-1 transition-all duration-100 focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="text-3xl md:text-4xl font-semibold text-slate-800 dark:text-white group-hover:scale-110 transition-transform">2</span>
</button>
<button class="group relative w-full aspect-square max-w-[100px] max-h-[100px] mx-auto flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-800 border-b-4 border-slate-200 dark:border-slate-900 active:border-b-0 active:translate-y-1 transition-all duration-100 focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="text-3xl md:text-4xl font-semibold text-slate-800 dark:text-white group-hover:scale-110 transition-transform">3</span>
</button>
<!-- Row 2 -->
<button class="group relative w-full aspect-square max-w-[100px] max-h-[100px] mx-auto flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-800 border-b-4 border-slate-200 dark:border-slate-900 active:border-b-0 active:translate-y-1 transition-all duration-100 focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="text-3xl md:text-4xl font-semibold text-slate-800 dark:text-white group-hover:scale-110 transition-transform">4</span>
</button>
<button class="group relative w-full aspect-square max-w-[100px] max-h-[100px] mx-auto flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-800 border-b-4 border-slate-200 dark:border-slate-900 active:border-b-0 active:translate-y-1 transition-all duration-100 focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="text-3xl md:text-4xl font-semibold text-slate-800 dark:text-white group-hover:scale-110 transition-transform">5</span>
</button>
<button class="group relative w-full aspect-square max-w-[100px] max-h-[100px] mx-auto flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-800 border-b-4 border-slate-200 dark:border-slate-900 active:border-b-0 active:translate-y-1 transition-all duration-100 focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="text-3xl md:text-4xl font-semibold text-slate-800 dark:text-white group-hover:scale-110 transition-transform">6</span>
</button>
<!-- Row 3 -->
<button class="group relative w-full aspect-square max-w-[100px] max-h-[100px] mx-auto flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-800 border-b-4 border-slate-200 dark:border-slate-900 active:border-b-0 active:translate-y-1 transition-all duration-100 focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="text-3xl md:text-4xl font-semibold text-slate-800 dark:text-white group-hover:scale-110 transition-transform">7</span>
</button>
<button class="group relative w-full aspect-square max-w-[100px] max-h-[100px] mx-auto flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-800 border-b-4 border-slate-200 dark:border-slate-900 active:border-b-0 active:translate-y-1 transition-all duration-100 focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="text-3xl md:text-4xl font-semibold text-slate-800 dark:text-white group-hover:scale-110 transition-transform">8</span>
</button>
<button class="group relative w-full aspect-square max-w-[100px] max-h-[100px] mx-auto flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-800 border-b-4 border-slate-200 dark:border-slate-900 active:border-b-0 active:translate-y-1 transition-all duration-100 focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="text-3xl md:text-4xl font-semibold text-slate-800 dark:text-white group-hover:scale-110 transition-transform">9</span>
</button>
<!-- Row 4 -->
<div class="w-full max-w-[100px] mx-auto"></div> <!-- Empty spacer -->
<button class="group relative w-full aspect-square max-w-[100px] max-h-[100px] mx-auto flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-800 border-b-4 border-slate-200 dark:border-slate-900 active:border-b-0 active:translate-y-1 transition-all duration-100 focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="text-3xl md:text-4xl font-semibold text-slate-800 dark:text-white group-hover:scale-110 transition-transform">0</span>
</button>
<button class="group relative w-full aspect-square max-w-[100px] max-h-[100px] mx-auto flex items-center justify-center rounded-2xl hover:bg-red-50 dark:hover:bg-red-900/10 text-slate-400 hover:text-red-500 dark:text-slate-500 dark:hover:text-red-400 transition-colors focus:outline-none focus:ring-2 focus:ring-red-200">
<span class="material-symbols-outlined text-[40px] group-active:scale-90 transition-transform">backspace</span>
</button>
</div>
<!-- Helper Text / Footer -->
<div class="mt-12 text-center">
<p class="text-sm font-medium text-primary hover:underline cursor-pointer">Forgot your employee code?</p>
</div>
</main>
</div>
</body></html>
